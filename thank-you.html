<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank You | Morristown Matters</title>
<meta name="description" content="Thanks for subscribing to Morristown Matters." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .ty{ display:flex; align-items:center; justify-content:center; text-align:center; padding:90px 0 100px; background:var(--cream); min-height:calc(100vh - 84px); }
  .ty-card{ max-width:560px; }
  .ty-mark{ width:84px; height:84px; border-radius:50%; border:2px solid var(--gold); color:var(--gold); display:flex; align-items:center; justify-content:center; margin:0 auto 28px; }
  .ty-mark svg{ width:40px; height:40px; fill:none; stroke:currentColor; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .ty-title{ font-family:var(--serif); font-size:42px; line-height:1.1; margin:0 0 16px; color:var(--ink); }
  .ty-text{ color:var(--muted); font-size:17px; margin:0 0 32px; }
</style>
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="site-header" id="top">
  <div class="wrap header-inner">
    <a class="brand" href="index.html" aria-label="Morristown Matters home">
      <img class="logo-img" src="images/logo.png" alt="Morristown Matters" />
    </a>
    <nav class="main-nav" aria-label="Main">
      <a href="index.html">HOME</a>
      <a href="index.html#about">ABOUT</a>
      <a href="index.html#news">NEWS</a>
      <a href="index.html#events">EVENTS</a>
      <a href="index.html#get-involved">GET INVOLVED</a>
      <a href="index.html#contact">CONTACT</a>
    </nav>
  </div>
</header>

<!-- ============ THANK YOU ============ -->
<main class="ty">
  <div class="wrap ty-card">
    <div class="ty-mark">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <p class="eyebrow" style="justify-content:center;"><span class="eyebrow-rule"></span>YOU'RE ON THE LIST<span class="eyebrow-rule"></span></p>
    <h1 class="ty-title">Thank you for subscribing.</h1>
    <p class="ty-text">
      You'll now get the latest Morristown news, events, and Derby Days updates
      delivered straight to your inbox. Welcome to the community.
    </p>
    <a class="btn btn-gold btn-center" href="index.html">BACK TO HOME <span class="arr">&rarr;</span></a>
  </div>
</main>

<!-- ============ FOOTER ============ -->
<footer class="site-footer">
